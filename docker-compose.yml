services:
  api:
    build: .
    container_name: ai-saas-api
    depends_on:
      postgres:
        condition: service_healthy
      bitnet:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./models:/app/models:ro
    environment:
      - APP_ENV=development
      - PYTHONPATH=/app
      - YOLO_DEVICE=cpu
      - YOLO_MODEL_PATH=${YOLO_MODEL_PATH:-/app/models/yolo/best.pt}
      - YOLO_DISPLAY_NAME=${YOLO_DISPLAY_NAME:-ecowaste-yolo-taco-best}
      - YOLO_CONF_THRESHOLD=${YOLO_CONF_THRESHOLD:-0.30}
      - YOLO_IMAGE_SIZE=${YOLO_IMAGE_SIZE:-640}
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-ai_user}:${POSTGRES_PASSWORD:-ai_password}@postgres:5432/${POSTGRES_DB:-ai_saas}
      - BITNET_BASE_URL=http://bitnet:8080
      - BITNET_MODEL_NAME=microsoft/bitnet-b1.58-2B-4T
      - BITNET_TIMEOUT_SECONDS=180
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_OUTPUT_COLLECTION=${FIREBASE_OUTPUT_COLLECTION:-model_outputs}
      - FIREBASE_POSTPROCESS_COLLECTION=${FIREBASE_POSTPROCESS_COLLECTION:-postprocessed_outputs}
      - RABBITMQ_URL=amqp://${RABBITMQ_DEFAULT_USER:-ai_user}:${RABBITMQ_DEFAULT_PASS:-ai_password}@rabbitmq:5672/
      - RABBITMQ_QUEUE=${RABBITMQ_QUEUE:-postprocess_jobs}
      - BITNET_BASE_URL=http://bitnet:8080
      - BITNET_MODEL_NAME=microsoft/bitnet-b1.58-2B-4T
      - BITNET_TIMEOUT_SECONDS=180
      - ENABLE_BITNET_IMAGE_INTERPRETATION=${ENABLE_BITNET_IMAGE_INTERPRETATION:-true}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1,api,testserver}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8000}
      - MAX_REQUEST_BYTES=${MAX_REQUEST_BYTES:-10485760}
      - RATE_LIMIT_REQUESTS=${RATE_LIMIT_REQUESTS:-120}
      - RATE_LIMIT_WINDOW_SECONDS=${RATE_LIMIT_WINDOW_SECONDS:-60}
      - ALLOWED_IMAGE_CONTENT_TYPES=${ALLOWED_IMAGE_CONTENT_TYPES:-image/jpeg,image/png,image/webp}
    restart: unless-stopped

  worker:
    build: .
    container_name: ai-saas-worker
    command: python -m app.worker
    depends_on:
      rabbitmq:
        condition: service_healthy
      bitnet:
        condition: service_started
    environment:
      - PYTHONPATH=/app
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_OUTPUT_COLLECTION=${FIREBASE_OUTPUT_COLLECTION:-model_outputs}
      - FIREBASE_POSTPROCESS_COLLECTION=${FIREBASE_POSTPROCESS_COLLECTION:-postprocessed_outputs}
      - RABBITMQ_URL=amqp://${RABBITMQ_DEFAULT_USER:-ai_user}:${RABBITMQ_DEFAULT_PASS:-ai_password}@rabbitmq:5672/
      - RABBITMQ_QUEUE=${RABBITMQ_QUEUE:-postprocess_jobs}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1,api,testserver}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8000}
      - MAX_REQUEST_BYTES=${MAX_REQUEST_BYTES:-10485760}
      - RATE_LIMIT_REQUESTS=${RATE_LIMIT_REQUESTS:-120}
      - RATE_LIMIT_WINDOW_SECONDS=${RATE_LIMIT_WINDOW_SECONDS:-60}
      - ALLOWED_IMAGE_CONTENT_TYPES=${ALLOWED_IMAGE_CONTENT_TYPES:-image/jpeg,image/png,image/webp}
    restart: unless-stopped

  bitnet:
    build:
      context: .
      dockerfile: Dockerfile.bitnet
    container_name: ai-saas-bitnet
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - BITNET_HOST=0.0.0.0
      - BITNET_PORT=8080
      - BITNET_THREADS=4
      - BITNET_CTX_SIZE=2048
      - BITNET_N_PREDICT=128
      - BITNET_TEMPERATURE=0.7
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: ai-saas-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-ai_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ai_password}
      - POSTGRES_DB=${POSTGRES_DB:-ai_saas}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_user -d ai_saas"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: ai-saas-rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER:-ai_user}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS:-ai_password}
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  prometheus:
    image: prom/prometheus
    container_name: ai-saas-prometheus
    depends_on:
      - api
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    restart: unless-stopped

  grafana:
    image: grafana/grafana-oss
    container_name: ai-saas-grafana
    depends_on:
      - prometheus
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    restart: unless-stopped

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
