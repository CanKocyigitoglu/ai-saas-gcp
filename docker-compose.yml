services:
  api:
    build: .
    container_name: ai-saas-api
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - APP_ENV=development
      - PYTHONPATH=/app
      - YOLO_DEVICE=cpu
      - YOLO_MODEL_PATH=yolo11n.pt
      - YOLO_CONF_THRESHOLD=0.25
      - YOLO_IMAGE_SIZE=640
    restart: unless-stopped
