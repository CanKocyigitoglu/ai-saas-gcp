services:
  api:
    build: .
    container_name: ai-saas-api
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - APP_ENV=development
      - PYTHONPATH=/app
      - YOLO_DEVICE=cpu
      - YOLO_MODEL_PATH=yolo11n.pt
      - YOLO_CONF_THRESHOLD=0.25
      - YOLO_IMAGE_SIZE=640
      - DATABASE_URL=postgresql+psycopg2://ai_user:ai_password@postgres:5432/ai_saas
      - BITNET_BASE_URL=http://bitnet:8080
      - BITNET_MODEL_NAME=microsoft/bitnet-b1.58-2B-4T
      - BITNET_TIMEOUT_SECONDS=180
    restart: unless-stopped

  bitnet:
    build:
      context: .
      dockerfile: Dockerfile.bitnet
    container_name: ai-saas-bitnet
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - BITNET_HOST=0.0.0.0
      - BITNET_PORT=8080
      - BITNET_THREADS=4
      - BITNET_CTX_SIZE=2048
      - BITNET_N_PREDICT=256
      - BITNET_TEMPERATURE=0.7
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: ai-saas-postgres
    environment:
      - POSTGRES_USER=ai_user
      - POSTGRES_PASSWORD=ai_password
      - POSTGRES_DB=ai_saas
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_user -d ai_saas"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
